name: 🚗 Sync véhicules La Centrale

# Ce workflow est déclenché manuellement (workflow_dispatch) ou automatiquement
# quand le Mac pousse vehicules.json via l'API GitHub.
#
# ⚠️  Le scraping automatique s'exécute sur le MAC (pas sur GitHub Actions)
#     car La Centrale utilise DataDome qui bloque les IPs de datacenter.
#     → Installer com.autocentre.scraper.plist sur le Mac pour l'automatisation.

on:
  workflow_dispatch:       # Déclenchement manuel depuis l'onglet Actions
  push:
    paths:
      - 'vehicules.json'   # Se déclenche aussi quand le Mac pousse du JSON

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-22.04
    timeout-minutes: 2
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📊 Vérifier vehicules.json
        run: |
          echo "=== État vehicules.json ==="
          python3 -c "
          import json
          with open('vehicules.json') as f:
              d = json.load(f)
          print(f'Dernière MAJ : {d.get(\"derniere_maj\",\"jamais\")}')
          print(f'Véhicules    : {len(d.get(\"vehicules\",[]))}')
          "
