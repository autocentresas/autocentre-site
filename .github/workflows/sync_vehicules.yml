name: 🚗 Sync véhicules La Centrale

on:
  schedule:
    - cron: '0 * * * *'   # toutes les heures, 24h/24
  workflow_dispatch:        # déclenchement manuel depuis l'onglet Actions

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    steps:
      - name: 📥 Checkout du dépôt
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Installer Playwright + Chromium + stealth
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: 🖥️ Démarrer affichage virtuel (Xvfb)
        run: |
          sudo apt-get install -y xvfb > /dev/null 2>&1
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          echo "Xvfb démarré sur :99"

      - name: 🔍 Scraper pros.lacentrale.fr/C054723
        env:
          DISPLAY: ':99'
        run: python scraper.py

      - name: 💾 Commit vehicules.json si modifié
        run: |
          git config --local user.email "autocentre-bot@users.noreply.github.com"
          git config --local user.name "Autocentre Bot"
          git add vehicules.json
          if git diff --staged --quiet; then
            echo "Aucun changement — site déjà à jour."
          else
            git commit -m "🚗 Véhicules mis à jour — $(date '+%d/%m/%Y %H:%M')"
            git push
          fi
